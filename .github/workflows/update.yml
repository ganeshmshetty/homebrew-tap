name: Auto-update Casks

on:
  schedule:
    - cron: '*/30 * * * *' # Check every 30 minutes
  repository_dispatch:
    types: [update-remotectrl-cask]
  workflow_dispatch: # Allow manual trigger

jobs:
  update-mirin:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v4

      - name: Fetch latest release from Mirin repo
        id: get_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_DATA=$(curl -fsSL \
            -u "x-access-token:${GH_TOKEN}" \
            https://api.github.com/repos/ganeshmshetty/mirin/releases/latest)
          VERSION_TAG=$(echo "$RELEASE_DATA" | jq -r '.tag_name')
          VERSION=${VERSION_TAG#v}

          if [ -z "$VERSION_TAG" ] || [ "$VERSION_TAG" = "null" ]; then
            echo "Unable to read latest release tag from GitHub API response"
            echo "$RELEASE_DATA"
            exit 1
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          

      - name: Check if update is needed
        id: check
        run: |
          CURRENT_VERSION=$(grep -E 'version "' Casks/mirin.rb | sed -E 's/.*version "([^"]+)".*/\1/')
          if [ "$CURRENT_VERSION" = "${{ steps.get_release.outputs.VERSION }}" ]; then
            echo "UPDATED=false" >> $GITHUB_OUTPUT
          else
            echo "UPDATED=true" >> $GITHUB_OUTPUT
          fi

      - name: Update Cask Version
        if: steps.check.outputs.UPDATED == 'true'
        run: |
          sed -i -E "s/version \".*\"/version \"${{ steps.get_release.outputs.VERSION }}\"/" Casks/mirin.rb

      - name: Commit and Push Cask changes
        if: steps.check.outputs.UPDATED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/mirin.rb
          git commit -m "Update Mirin Cask to v${{ steps.get_release.outputs.VERSION }}"
          git push origin master

  update-remotectrl:
    if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v4

      - name: Fetch latest release from RemCtrl repo
        id: get_release
        run: |
          RELEASE_DATA=$(curl -s https://api.github.com/repos/ganeshmshetty/RemCtrl/releases/latest)
          VERSION_TAG=$(echo "$RELEASE_DATA" | jq -r '.tag_name')
          VERSION=${VERSION_TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if update is needed
        id: check
        run: |
          CURRENT_VERSION=$(grep -E 'version "' Casks/remotectrl.rb | sed -E 's/.*version "([^"]+)".*/\1/')
          if [ "$CURRENT_VERSION" = "${{ steps.get_release.outputs.VERSION }}" ]; then
            echo "UPDATED=false" >> $GITHUB_OUTPUT
          else
            echo "UPDATED=true" >> $GITHUB_OUTPUT
          fi

      - name: Update Cask Version
        if: steps.check.outputs.UPDATED == 'true'
        run: |
          sed -i -E "s/version \".*\"/version \"${{ steps.get_release.outputs.VERSION }}\"/" Casks/remotectrl.rb

      - name: Commit and push changes
        if: steps.check.outputs.UPDATED == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/remotectrl.rb
          git commit -m "Bump remotectrl to ${{ steps.get_release.outputs.VERSION }}"
          git push
